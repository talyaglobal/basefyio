<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1019"/>
      <stop offset="55%" stop-color="#0b0e14"/>
      <stop offset="100%" stop-color="#080b11"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3ecf8e"/>
      <stop offset="100%" stop-color="#2bb377"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.16" cy="0.18" r="0.6">
      <stop offset="0%" stop-color="#3ecf8e" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#3ecf8e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <g stroke="#1a2230" stroke-width="1" opacity="0.5">
    <line x1="0" y1="158" x2="1200" y2="158"/>
    <line x1="0" y1="316" x2="1200" y2="316"/>
    <line x1="0" y1="474" x2="1200" y2="474"/>
  </g>

  <!-- Accent top bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Logo mark -->
  <g transform="translate(80, 70)">
    <rect width="64" height="64" rx="14" fill="#0e131c" stroke="#232c3b" stroke-width="1.5"/>
    <path d="M18 16h17a11 11 0 0 1 2.4 21.7A11.5 11.5 0 0 1 34 48H18V16Zm8 6v7h8a3.5 3.5 0 0 0 0-7h-8Zm0 13v7h8a3.5 3.5 0 0 0 0-7h-8Z" fill="url(#accent)"/>
  </g>
  <text x="164" y="113" font-size="38" font-weight="700" fill="#e6edf3">basefy<tspan fill="#3ecf8e">io</tspan></text>

  <!-- Badge -->
  <g transform="translate(80, 210)">
    <rect width="318" height="40" rx="20" fill="#0f2a20" stroke="#1f5a42" stroke-width="1"/>
    <circle cx="26" cy="20" r="5" fill="#3ecf8e"/>
    <text x="46" y="27" font-size="17" font-weight="600" letter-spacing="1.5" fill="#3ecf8e">OPEN SOURCE · SELF-HOSTED · APACHE 2.0</text>
  </g>

  <!-- Headline -->
  <text x="78" y="330" font-size="62" font-weight="800" fill="#e6edf3" letter-spacing="-1.5">Open-source, self-hosted</text>
  <text x="78" y="404" font-size="62" font-weight="800" fill="#e6edf3" letter-spacing="-1.5">backend platform</text>

  <!-- Sub / capability line -->
  <text x="80" y="476" font-size="30" font-weight="600" fill="#9aa7b8">
    Dedicated Postgres
    <tspan fill="#3ecf8e" dx="14" dy="0">·</tspan>
    <tspan fill="#9aa7b8" dx="14">Auth</tspan>
    <tspan fill="#3ecf8e" dx="14">·</tspan>
    <tspan fill="#9aa7b8" dx="14">Storage</tspan>
    <tspan fill="#3ecf8e" dx="14">·</tspan>
    <tspan fill="#9aa7b8" dx="14">SQL</tspan>
  </text>

  <!-- Bottom strip -->
  <text x="80" y="565" font-size="22" fill="#5f6e80">A dedicated database, auth realm &amp; storage bucket per project.</text>
  <text x="1120" y="565" font-size="22" font-weight="600" fill="#5f6e80" text-anchor="end">github.com/myfyio/basefyio</text>
</svg>
