services:
  # ── Infrastructure ────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-basefyio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-basefyio_secret}
      POSTGRES_DB: basefyio
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-basefyio}"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-basefyio}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-basefyio_secret}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    command: start-dev
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET / HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'HTTP/1.1'"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-basefyio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-basefyio_secret}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"
    volumes:
      - pgbouncer_config:/etc/pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 || true"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NoSQL Store (Data Engine, opt-in) ────────────────────
  # Enable with: docker compose --profile couchdb up -d
  # Then set DATA_ENGINE_PROVIDER=couchdb in .env
  couchdb:
    image: apache/couchdb:3
    profiles: ["couchdb"]
    restart: unless-stopped
    ports:
      - "${COUCHDB_PORT:-5984}:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data
    environment:
      COUCHDB_USER: ${NOSQL_USERNAME:-basefyio}
      COUCHDB_PASSWORD: ${NOSQL_PASSWORD:-basefyio_secret}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5984/_up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ── Applications ──────────────────────────────────────────

  platform-api:
    build:
      context: .
      dockerfile: apps/platform-api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-basefyio}:${POSTGRES_PASSWORD:-basefyio_secret}@postgres:5432/basefyio
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-basefyio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-basefyio_secret}
      POSTGRES_DB: basefyio
      POSTGRES_PUBLIC_HOST: ${POSTGRES_PUBLIC_HOST:-localhost}
      POSTGRES_PUBLIC_PORT: ${POSTGRES_PUBLIC_PORT:-5433}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_ADMIN_CLIENT_ID: admin-cli
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-basefyio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-basefyio_secret}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost}
      MINIO_PUBLIC_PORT: ${MINIO_PUBLIC_PORT:-9000}
      REDIS_URL: redis://redis:6379
      PGBOUNCER_HOST: pgbouncer
      PGBOUNCER_PORT: 6432
      PGBOUNCER_EXTERNAL_HOST: ${PGBOUNCER_EXTERNAL_HOST:-localhost}
      PGBOUNCER_EXTERNAL_PORT: ${PGBOUNCER_PORT:-6432}
      PGBOUNCER_CONFIG_DIR: /etc/pgbouncer
      CORS_ORIGIN: "*"
      APP_URL: ${APP_URL:-http://localhost:3000}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:4000}
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      DOCKER_NETWORK: basefyio_default
      # Data Engine (disabled by default; set to 'couchdb' and enable couchdb profile to use)
      DATA_ENGINE_PROVIDER: ${DATA_ENGINE_PROVIDER:-disabled}
      NOSQL_CONNSTR: ${NOSQL_CONNSTR:-http://couchdb:5984}
      NOSQL_USERNAME: ${NOSQL_USERNAME:-basefyio}
      NOSQL_PASSWORD: ${NOSQL_PASSWORD:-basefyio_secret}
      DATA_ENGINE_CONTAINER: ${DATA_ENGINE_CONTAINER:-basefyio-apps}
      DATA_ENGINE_NAMESPACE: ${DATA_ENGINE_NAMESPACE:-projects}
      DATA_ENGINE_MAX_DOC_KB: ${DATA_ENGINE_MAX_DOC_KB:-1024}
      DATA_ENGINE_MAX_NESTING_DEPTH: ${DATA_ENGINE_MAX_NESTING_DEPTH:-8}
      DATA_ENGINE_MAX_ARRAY_ITEMS: ${DATA_ENGINE_MAX_ARRAY_ITEMS:-1000}
      # Optional: AI features (leave empty to disable)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Optional: Email (leave empty to disable email features)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-basefyio <noreply@example.com>}
    ports:
      - "${PLATFORM_API_PORT:-4000}:4000"
    volumes:
      - pgbouncer_config:/etc/pgbouncer
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_healthy

  # ── Admin UI (NOT YET SHIPPED in v0.1) ───────────────────
  # The dashboard app under apps/admin-ui has not been implemented yet, so
  # there is no Dockerfile to build. This service is intentionally commented
  # out rather than left active: an active service pointing at a non-existent
  # build context makes `docker compose build` fail and the release gate lie.
  # Uncomment once apps/admin-ui ships a Dockerfile, and re-add the section to
  # README / docs/architecture at the same time.
  #
  # admin-ui:
  #   build:
  #     context: ./apps/admin-ui
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   environment:
  #     API_INTERNAL_URL: http://platform-api:4000
  #   ports:
  #     - "${ADMIN_UI_PORT:-3000}:3000"
  #   depends_on:
  #     - platform-api

volumes:
  postgres_data:
  redis_data:
  minio_data:
  couchdb_data:
  pgbouncer_config:
