version: "3.9"

services:
  # ── Infrastructure ───────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kolaybase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kolaybase_secret}
      POSTGRES_DB: kolaybase
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kolaybase}"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-kolaybase}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-kolaybase_secret}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    command: start-dev
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kolaybase}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-kolaybase_secret}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"
    volumes:
      - pgbouncer_config:/etc/pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 || true"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Applications ─────────────────────────────────────────

  platform-api:
    build:
      context: ./apps/platform-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-kolaybase}:${POSTGRES_PASSWORD:-kolaybase_secret}@postgres:5432/kolaybase
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-kolaybase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kolaybase_secret}
      POSTGRES_DB: kolaybase
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_ADMIN_CLIENT_ID: admin-cli
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-kolaybase}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-kolaybase_secret}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost}
      MINIO_PUBLIC_PORT: ${MINIO_PUBLIC_PORT:-9000}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-Kolaybase <noreply@kolaybase.com>}
      RESEND_REPLY_TO: ${RESEND_REPLY_TO:-support@kolaybase.com}
      APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000
      PGBOUNCER_HOST: pgbouncer
      PGBOUNCER_PORT: 6432
      PGBOUNCER_EXTERNAL_HOST: ${PGBOUNCER_EXTERNAL_HOST:-localhost}
      PGBOUNCER_EXTERNAL_PORT: ${PGBOUNCER_PORT:-6432}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:4000}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_TEAMS_CLIENT_ID: ${GITHUB_TEAMS_CLIENT_ID:-}
      GITHUB_TEAMS_CLIENT_SECRET: ${GITHUB_TEAMS_CLIENT_SECRET:-}
      PGBOUNCER_CONFIG_DIR: /etc/pgbouncer
    ports:
      - "${PLATFORM_API_PORT:-4000}:4000"
    volumes:
      - pgbouncer_config:/etc/pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_healthy

  admin-ui:
    build:
      context: ./apps/admin-ui
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://platform-api:4000
    ports:
      - "${ADMIN_UI_PORT:-3000}:3000"
    depends_on:
      - platform-api

  website:
    build:
      context: ./apps/website
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${WEBSITE_PORT:-3002}:3000"
    environment:
      HOSTNAME: 0.0.0.0

volumes:
  postgres_data:
  redis_data:
  minio_data:
  pgbouncer_config: