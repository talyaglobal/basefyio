name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── Scope note ────────────────────────────────────────────────
# CI is an honest signal of repository health and gates every package
# expected to compile.
#
# `apps/platform-api` has completed its migration and is now gated in
# its own `platform-api` job, which provisions the
# Postgres + Redis service containers it needs and applies Prisma
# migrations against a real database. The `packages` job covers the
# service-free workspaces (`@basefyio/cli`, `@basefyio/sdk`).

jobs:
  packages:
    name: Packages (cli, sdk)
    runs-on: ubuntu-latest

    # Service-free workspaces. platform-api is gated separately (below).
    env:
      READY_FILTERS: "--filter @basefyio/cli --filter @basefyio/sdk"

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Validate repository metadata
        run: |
          test -f package.json || { echo "::error::root package.json missing"; exit 1; }
          test -f pnpm-workspace.yaml || { echo "::error::pnpm-workspace.yaml missing"; exit 1; }
          node -e "const p=require('./package.json'); if(p.name!=='basefyio'){throw new Error('name must be basefyio')}; if(p.private!==true){throw new Error('package must be private')}; if(p.license!=='Apache-2.0'){throw new Error('license must be Apache-2.0')}; console.log('root package.json OK:', p.name, p.license)"

      - name: Validate workspace integrity
        run: |
          test -f pnpm-lock.yaml || { echo "::error::pnpm-lock.yaml missing — commit a lockfile"; exit 1; }
          echo "Gated packages: $READY_FILTERS"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm $READY_FILTERS run typecheck

      - name: Build
        run: pnpm $READY_FILTERS run build

      - name: Lint (if configured)
        run: pnpm $READY_FILTERS --if-present run lint

      - name: Test
        run: pnpm $READY_FILTERS run test

  platform-api:
    name: Platform API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: basefyio
          POSTGRES_PASSWORD: basefyio_secret
          POSTGRES_DB: basefyio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U basefyio"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      # Provisioned because platform-api requires Redis at runtime (queue +
      # redis modules); integration tests that boot the full app use it.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://basefyio:basefyio_secret@localhost:5432/basefyio?schema=public
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # platform-api imports @basefyio/data-engine (workspace package), which
      # must be compiled to dist/ before platform-api typechecks or builds.
      - name: Build workspace dependencies
        run: pnpm --filter "@basefyio/platform-api^..." run build

      - name: Generate Prisma client
        run: pnpm --filter @basefyio/platform-api run prisma:generate

      - name: Apply migrations (real Postgres)
        run: pnpm --filter @basefyio/platform-api run prisma:migrate:deploy

      - name: Type check
        run: pnpm --filter @basefyio/platform-api run typecheck

      - name: Build
        run: pnpm --filter @basefyio/platform-api run build

      - name: Unit tests
        run: pnpm --filter @basefyio/platform-api run test

      - name: Integration test (health e2e)
        run: pnpm --filter @basefyio/platform-api run test:e2e
