name: Build & Push to GHCR

on:
  push:
    branches: [production]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Detect which apps changed ──────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/platform-api/**'
            ui:
              - 'apps/admin-ui/**'

  # ── Build API (only if apps/platform-api changed) ──────
  build-api:
    name: Build Platform API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kolaybase-api
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ./apps/platform-api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Build UI (only if apps/admin-ui changed) ───────────
  build-ui:
    name: Build Admin UI
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kolaybase-ui
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ./apps/admin-ui
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Deploy (always runs unless a build failed) ─────────
  deploy:
    name: Deploy to Production
    needs: [changes, build-api, build-ui]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: "docker-compose.prod.yml,scripts/init-db.sql"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          API_CHANGED: ${{ needs.changes.outputs.api }}
          UI_CHANGED: ${{ needs.changes.outputs.ui }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          envs: API_CHANGED,UI_CHANGED
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin

            SERVICES=""
            if [ "$API_CHANGED" = "true" ]; then
              SERVICES="$SERVICES platform-api"
            fi
            if [ "$UI_CHANGED" = "true" ]; then
              SERVICES="$SERVICES admin-ui"
            fi

            if [ -n "$SERVICES" ]; then
              echo "Pulling changed images:$SERVICES"
              docker compose -f docker-compose.prod.yml --env-file .env.production pull $SERVICES
            else
              echo "No image changes, skipping pull"
            fi

            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans
