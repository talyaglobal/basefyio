# Development override — hot reload for admin-ui.
#
# Usage:
#   docker compose stop admin-ui
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d admin-ui-dev
#
# Source code is bind-mounted, so edits on the host are picked up instantly
# by `next dev` (polling enabled for Windows file systems).

services:
  admin-ui-dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://platform-api:4000
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      # Windows bind mounts do not emit inotify events — poll instead.
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${ADMIN_UI_PORT:-3000}:3000"
    volumes:
      - ./apps/admin-ui:/app
      # Keep node_modules and .next inside the container (Linux binaries,
      # faster I/O than the Windows bind mount).
      - admin_ui_dev_node_modules:/app/node_modules
      - admin_ui_dev_next:/app/.next
    depends_on:
      - platform-api

volumes:
  admin_ui_dev_node_modules:
  admin_ui_dev_next:
